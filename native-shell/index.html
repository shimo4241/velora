<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070705" />
    <title>Velora</title>
    <style>
      :root {
        color-scheme: dark;
        background: #070705;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 16%, rgba(196, 162, 101, 0.18), transparent 34%),
          linear-gradient(145deg, #070705, #0d0d0a 48%, #000);
        color: #f5f3ee;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(82vw, 320px);
        text-align: center;
      }

      .mark {
        margin: 0 auto 18px;
        display: grid;
        height: 76px;
        width: 76px;
        place-items: center;
        border-radius: 24px;
        border: 1px solid rgba(196, 162, 101, 0.28);
        background: rgba(255, 255, 255, 0.045);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45), 0 0 34px rgba(196, 162, 101, 0.12);
      }

      .mark span {
        color: #c4a265;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 10px 0 0;
        color: #a09a8c;
        font-size: 13px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark"><span>V</span></div>
      <h1>Velora</h1>
      <p>Initialisation de l'experience mobile securisee.</p>
    </main>
  </body>
</html>
